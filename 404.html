<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 | 德裕新塑胶</title>
  <link rel="stylesheet" href="css/style.css?v=33.0">
  <link rel="icon" type="image/png" href="https://sc01.alicdn.com/kf/A005029e2fcb14751a5071525a122794dZ.png">
  <style>
    .error-container {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--blue);
      line-height: 1;
      margin-bottom: 20px;
    }
    .error-msg {
      font-size: 1.5rem;
      color: var(--gray-700);
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <div class="error-msg">
      <span class="zh">抱歉，您访问的页面不存在</span>
      <span class="en">Sorry, the page you are looking for does not exist.</span>
    </div>
    <a href="index.html" class="btn btn-primary">
      <span class="zh">返回首页</span>
      <span class="en">Back to Home</span>
    </a>
  </div>
</body>
</html>
